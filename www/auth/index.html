<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하트가디언즈 — 로그인</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- #stage: 1280×800 좌표계, px 절대배치 (R1) -->
    <div id="stage">
      <div class="auth">
        <img
          class="auth__banner"
          src="../assets/ui/TitleBanner.webp"
          alt="하트 가디언즈: 우주 공감 탐험대"
        />
        <!-- 패널 내용(checking/welcome/chooser/login/signup)은 script.js가 그린다. -->
        <div class="auth__panel" id="auth-panel"></div>
      </div>
    </div>

    <!-- DEV 전용 테스트 계정. gitignore된 www/dev-config.js가 있을 때만 로드(없으면 무시). -->
    <script src="../dev-config.js" onerror="this.remove()"></script>
    <script src="script.js"></script>
  </body>
</html>
