<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하트가디언즈 — 그림자 행성 미션3</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- #stage: 미션 무대는 1920×1200 좌표계(원본 useFitStage 기본값과 동일), px 절대배치.
         player/ 엔진 관례를 그대로 따른다(R1 뼈대의 숫자만 1280×800 → 1920×1200 교체).
         ⚠ 이 미션은 mission03.json 이 딱 2노드: p4_m3_intro(line, bannerNode) → p4_m3_play
         (minigame, next:null)뿐이다. 인트로 이후로는 미니게임(HeartConnectStage)이 화면
         전체(story→quiz→video→epilogue→success)를 소유하고 행성4 완료(completePlanet(4)+
         홈 이동)까지 직접 처리한다 — 엔진 finishMinigame/#nextBtn 을 거치지 않는다
         (원본 planet4/index.tsx games.heartConnect 주석 참고).
         그래서 friendWrap/hatiBox/cardStage/completeBanner/lightOverlay/fxLayer/radar/cast/
         #nextBtn 은 전부 미포함이다(이 미션은 한 번도 쓰지 않는다 — YAGNI). -->
    <div id="stage">
      <!-- 배경(하트 커넥트 내부 — 전 구간 동일 이미지, sparse 전환 없음이라 정적으로 1회 세팅) -->
      <img id="bg" src="" alt="" />

      <!-- 진행 스테퍼(좌상단) — 정적 3단계, 이 미션은 항상 3단계(active) 고정
           (완료 즉시 홈으로 이동해 "done" 상태를 보여줄 새가 없다 — 원본과 동일). -->
      <div id="progress">
        <div class="prog-title">
          <span class="star">⭐</span>
          <span>탐험 진행도</span>
        </div>
        <div class="stepper">
          <div class="pnode" id="mission1">
            <div class="circle"><span class="num">1</span></div>
            <div class="label">가디언즈 최종 점검</div>
          </div>
          <div class="connector" id="conn1"></div>
          <div class="pnode" id="mission2">
            <div class="circle"><span class="num">2</span></div>
            <div class="label">공감 나침반 작전</div>
          </div>
          <div class="connector" id="conn2"></div>
          <div class="pnode" id="mission3">
            <div class="circle"><span class="num">3</span></div>
            <div class="label">마지막 공감 연결</div>
          </div>
        </div>
      </div>

      <!-- 좌측 가운데 장식 이미지(노드 p4_m3_intro 의 sideImageLeft) — "하트 커넥트 우주" 삽화.
           .p4_m3 #sideImageLeft 오버라이드로 좌우 반전(scaleX(-1))된다. 인트로 노드에서만 표시. -->
      <img id="sideImageLeft" src="" alt="" />

      <!-- 인트로 타이틀 배너(p4_m3_intro 가 theme.bannerNode) -->
      <div id="titleBanner">
        <div class="tb-badge">
          <span class="tb-star">★</span>
          <span class="tb-pill">최종 미션</span>
          <span class="tb-star">★</span>
        </div>
        <div class="tb-title">마지막 공감 연결</div>
        <div class="tb-ribbon">
          <span class="tb-spark">✦</span>
          <span>하트 커넥트를 복원하라!</span>
          <span class="tb-spark">✦</span>
        </div>
      </div>

      <!-- 인트로 전신 하티 -->
      <img id="hatiFull" src="../../assets/char/Hati/hati_robot_explaining.png" alt="하티" />

      <!-- 인트로 하티 말풍선 -->
      <div id="hatiBubble" class="bubble">
        <div class="bubble-name">하티</div>
        <span></span>
      </div>

      <!-- 미니게임(하트 커넥트 : 마지막 연결) 마운트 지점 — HeartConnectStage.tsx 이식.
           story→quiz→video→epilogue→success 전체를 이 안에서 소유한다. -->
      <div id="minigameLayer"></div>

      <!-- 탭 힌트(인트로 라인 진행 안내) -->
      <div id="tapHint"></div>
    </div>

    <!-- DEV 전용 테스트 계정. gitignore된 www/dev-config.js가 있을 때만 로드(없으면 무시). -->
    <script src="../../dev-config.js" onerror="this.remove()"></script>
    <script src="script.js"></script>
  </body>
</html>
