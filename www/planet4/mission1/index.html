<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하트가디언즈 — 그림자 행성 미션1</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- #stage: 미션 무대는 1920×1200 좌표계(원본 useFitStage 기본값과 동일), px 절대배치.
         player/ 엔진 관례를 그대로 따른다(R1 뼈대의 숫자만 1280×800 → 1920×1200 교체).
         ⚠ 이 미션은 mission01.json 이 line/minigame 노드만 쓴다(choice/branch 없음).
         showRadar:false(레이더 HUD 없음) + theme.cast 없음(캐릭터 무대 미사용) +
         sideImageLeft(좌측 "공감 도구 전시장" 이미지, planet4 미션1 최초 사용). -->
    <div id="stage">
      <!-- 배경(우주선 내부 — 전 구간 동일 이미지, .p4_m1 스코프에서 좌우 반전) -->
      <img id="bg" src="" alt="" />
      <div id="lightOverlay"></div>

      <!-- 진행 스테퍼(좌상단) — 정적 3단계 -->
      <div id="progress">
        <div class="prog-title">
          <span class="star">⭐</span>
          <span>탐험 진행도</span>
        </div>
        <div class="stepper">
          <div class="pnode" id="mission1">
            <div class="circle"><span class="num">1</span></div>
            <div class="label">가디언즈 최종 점검</div>
          </div>
          <div class="connector" id="conn1"></div>
          <div class="pnode" id="mission2">
            <div class="circle"><span class="num">2</span></div>
            <div class="label">공감 나침반 작전</div>
          </div>
          <div class="connector" id="conn2"></div>
          <div class="pnode" id="mission3">
            <div class="circle"><span class="num">3</span></div>
            <div class="label">마지막 공감 연결</div>
          </div>
        </div>
      </div>

      <!-- 좌측 가운데 장식 이미지(노드 sideImageLeft) — "공감 도구 전시장" 진열장.
           .p4_m1 #sideImageLeft 오버라이드로 우측(left:1150px)에 배치된다(이름과 달리
           실제 위치는 화면 오른쪽 — 배경 우주선 인테리어 진열장 위치에 맞춘 것). -->
      <img id="sideImageLeft" src="" alt="" />

      <!-- 인트로 타이틀 배너 -->
      <div id="titleBanner">
        <div class="tb-badge">
          <span class="tb-star">★</span>
          <span class="tb-pill">미션 1</span>
          <span class="tb-star">★</span>
        </div>
        <div class="tb-title">가디언즈 최종 점검</div>
        <div class="tb-ribbon">
          <span class="tb-spark">✦</span>
          <span>지금까지의 공감 여정을 돌아보고, 마지막 시험을 통과하라!</span>
          <span class="tb-spark">✦</span>
        </div>
      </div>

      <!-- 인트로 전신 하티 -->
      <img id="hatiFull" src="../../assets/char/Hati/hati_robot_explaining.webp" alt="하티" />

      <!-- 인트로 하티 말풍선 -->
      <div id="hatiBubble" class="bubble"><div class="bubble-name">하티</div><span></span></div>

      <!-- 친구(placeholder) — mission01.json 전 노드가 hideFriend:true 라 실제로는 안 보인다. -->
      <div id="friendWrap">
        <img id="friend" class="pop" src="" alt="루미" />
      </div>
      <div id="friendBubble" class="bubble"><span></span></div>

      <!-- 화면 가운데 카드들(공감 카드) -->
      <div id="cardStage"></div>

      <!-- 미니게임(가디언즈 최종 점검하기) 마운트 지점 — EmpathyCompassStage.tsx 이식 -->
      <div id="minigameLayer"></div>

      <!-- 하티 가이드 박스 -->
      <div id="hatiBox">
        <img id="hatiAvatar" class="pop" src="" alt="하티" />
        <div>
          <div id="hatiName">하티</div>
          <div id="hatiText"></div>
        </div>
      </div>

      <!-- 다음 미션으로 버튼(엔딩) — theme.finish.image 이미지 전용 배너 버튼(img-only) -->
      <button id="nextBtn" class="img-only" type="button" data-sfx="none">
        <img class="nb-full-img" src="../../assets/planet4/shadow-planet-move-banner.webp" alt="그림자 행성으로 이동" />
      </button>

      <!-- 탭 힌트 -->
      <div id="tapHint"></div>

      <!-- 반짝임 fx 레이어 -->
      <div id="fxLayer"></div>
    </div>

    <!-- DEV 전용 테스트 계정. gitignore된 www/dev-config.js가 있을 때만 로드(없으면 무시). -->
    <script src="../../dev-config.js" onerror="this.remove()"></script>
    <script src="script.js"></script>
  </body>
</html>
