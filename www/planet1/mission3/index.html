<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하트가디언즈 — 빛의 행성 미션3</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- #stage: 미션 무대는 1920×1200 좌표계(원본 useFitStage 기본값과 동일), px 절대배치.
         player/ 엔진 관례를 그대로 따른다(R1 뼈대의 숫자만 1280×800 → 1920×1200 교체).
         노드별로 script 가 node-<id> 클래스를 붙인다(원본 #stage.node-<id> 오버라이드용). -->
    <div id="stage">
      <!-- 배경(노드별 교체). black 상태에선 #bg 숨김 + #stage.blackbg(#000). -->
      <img id="bg" src="" alt="" />
      <div id="lightOverlay"></div>

      <!-- 진행 스테퍼(좌상단) — 정적 3단계 (미션3 = step 3, script 가 클래스 적용) -->
      <div id="progress">
        <div class="prog-title">
          <span class="star">⭐</span>
          <span>탐험 진행도</span>
        </div>
        <div class="stepper">
          <div class="pnode" id="mission1">
            <div class="circle"><span class="num">1</span></div>
            <div class="label">마음 신호<br />탐색하기</div>
          </div>
          <div class="connector" id="conn1"></div>
          <div class="pnode" id="mission2">
            <div class="circle"><span class="num">2</span></div>
            <div class="label">얼어붙은 공감<br />거울 깨우기</div>
          </div>
          <div class="connector" id="conn2"></div>
          <div class="pnode" id="mission3">
            <div class="circle"><span class="num">3</span></div>
            <div class="label">공감 없는<br />세상 바꾸기</div>
          </div>
        </div>
      </div>

      <!-- ⚠ 미션3는 마음 신호 탐색기 HUD(#radarHud)를 쓰지 않는다(theme.showRadar:false). -->

      <!-- 인트로 타이틀 배너 -->
      <div id="titleBanner">
        <div class="tb-badge">
          <span class="tb-star">★</span>
          <span class="tb-pill">미션 3</span>
          <span class="tb-star">★</span>
        </div>
        <div class="tb-title">공감 없는 세상</div>
        <div class="tb-ribbon">
          <span class="tb-spark">✦</span>
          <span>사라진 이해의 빛을 밝혀라</span>
          <span class="tb-spark">✦</span>
        </div>
      </div>

      <!-- 인트로 전신 하티 -->
      <img id="hatiFull" src="../../assets/char/Hati/hati_robot_explaining.webp" alt="하티" />

      <!-- 인트로 하티 말풍선 -->
      <div id="hatiBubble" class="bubble"><div class="bubble-name">하티</div><span></span></div>

      <!-- 친구(루나) — 미션3는 모든 노드가 hideFriend 라 실제로는 표시되지 않는다(레이어만 유지). -->
      <div id="friendWrap">
        <img id="friend" class="pop" src="" alt="친구" />
      </div>
      <div id="friendBubble" class="bubble"><span></span></div>

      <!-- 배경에 박힌 루나 위 이름표 — m3_intro 에서만 표시(CSS #stage.node-m3_intro). 위치는 CSS 노브로 조정 -->
      <div id="lunaName">루나</div>

      <!-- 화면 가운데 큰 이미지(노드 image) — q1·q2 루나 이미지, m3_end 리본 -->
      <img id="choiceImage" src="" alt="" />

      <!-- 화면 가운데 나란한 이미지들(노드 images) — mirror1·2·lesson 의 루나 2장 -->
      <div id="imageStack"></div>

      <!-- 선택지 패널 -->
      <div id="choicePanel">
        <div id="choicePrompt"></div>
        <div id="choices"></div>
      </div>

      <!-- 화면 가운데 카드들(공감 카드 / 리워드 카드) -->
      <div id="cardStage"></div>

      <!-- 동영상(#missionVideo)·완료 배너(#completeBanner)·공감 거울(#rubStage)은 script 가 동적 생성 -->

      <!-- 하티 가이드 박스 -->
      <div id="hatiBox">
        <img id="hatiAvatar" class="pop" src="" alt="하티" />
        <div>
          <div id="hatiName">하티</div>
          <div id="hatiText"></div>
        </div>
      </div>

      <!-- 마지막 미션 완료 → 우주선으로 홈 이동(엔딩) -->
      <button id="nextBtn" class="ship" type="button" data-sfx="none">
        <img class="nb-ship-icon" src="../../assets/char/SpaceshipIcon.webp" alt="" />
        <span>우주선으로 이동</span>
      </button>

      <!-- 탭 힌트 -->
      <div id="tapHint"></div>

      <!-- 반짝임 fx 레이어 -->
      <div id="fxLayer"></div>
    </div>

    <!-- DEV 전용 테스트 계정. gitignore된 www/dev-config.js가 있을 때만 로드(없으면 무시). -->
    <script src="../../dev-config.js" onerror="this.remove()"></script>
    <script src="script.js"></script>
  </body>
</html>
