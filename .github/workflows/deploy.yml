name: Deploy to Cloudflare Pages

# Auto-deploy the web build to Cloudflare Pages on every push to main.
# Also runnable manually from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Idempotent: succeeds the first time and is a no-op (|| true) afterwards.
      - name: Ensure Pages project exists
        run: npx wrangler pages project create heartguardians-app --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=heartguardians-app --branch=main
